name: TikTok Content System

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # 👉 防止卡死

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug ENV
        run: |
          echo "RAPID_API_KEY: ${RAPID_API_KEY:+SET}"
          echo "TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:+SET}"
          echo "CHAT_ID: ${TELEGRAM_CHAT_ID:+SET}"
        env:
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run script
        run: python main.py
        env:
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
