name: TikTok Bot

on:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时自动跑
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install

      - name: Run script
        run: python main.py
